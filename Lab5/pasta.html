<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paste Carbonara - La Gust Bun</title>
  <link rel="stylesheet" href="styles.css" />
</head>

 <script src="script.js"></script>
<body>

  <header class="antet-pagina">
    <h1 class="titlu-restaurant">La Gust Bun</h1>
    <div class="linie-decorativa"><span>✦</span></div>
    <p class="subtitlu-restaurant">Bucătărie Italiană Autentică</p>

  <main class="pagina-fel">

    <div class="antet-fel">

      <img src="imagini/pasta.jpeg" alt="Paste Carbonara" class="imagine-fel" />

    <div class="sectiune-reteta">

      <div class="card-reteta">
        <h3 class="titlu-card-reteta">
          <span class="icon">🍝</span> Ingrediente

          <li>Bacon</li>

      <div class="card-reteta">
        <h3 class="titlu-card-reteta">
          <span class="icon">👨‍🍳</span> Mod de preparare

          <li>Fierbe pastele</li>
          <li>Prăjește baconul</li>

    <a href="index.html" class="buton-inapoi">← Înapoi la meniu</a>

  <footer class="subsol">
